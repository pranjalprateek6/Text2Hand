<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Turn typed text or a PDF into your own handwriting" />
  <meta name="color-scheme" content="light" />
  <title>Text2Hand</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<main class="stage">

  <header class="intro">
    <h1 class="intro__title">Text2Hand</h1>
    <p class="intro__sub">Type it. Get it back in your own handwriting.</p>
  </header>

  <!-- ------------------------------------------------------------------ -->
  <!-- Write                                                              -->
  <!-- ------------------------------------------------------------------ -->
  <section class="panel" id="write">
    <div class="box" id="box">
      <textarea id="text" spellcheck="false"
                placeholder="Type or paste anything here. Or drop a PDF."></textarea>

      <!-- only while the box is empty: the quickest way to see the point -->
      <div class="tries" id="tries">
        <span class="tries__label">Try</span>
        <button class="try" data-sample="pangram">a pangram</button>
        <button class="try" data-sample="punctuation">punctuation</button>
        <button class="try" data-sample="symbols">symbols</button>
        <button class="try" data-sample="markdown">markdown</button>
      </div>

      <div class="box__foot">
        <div class="toggles">
          <button class="tog" id="tMarkdown" aria-pressed="false">Markdown</button>
          <button class="tog tog--on" id="tRuled" aria-pressed="true">Lines</button>
          <button class="tog tog--on" id="tTexture" aria-pressed="true">Texture</button>
          <button class="tog tog--on" id="tSkew" aria-pressed="true">Tilt</button>
        </div>
        <span class="count" id="count">0</span>
      </div>
    </div>

    <!-- appears only once a PDF is in hand -->
    <div class="pdf" id="pdf" hidden>
      <span class="pdf__ring" id="pdfRing" aria-hidden="true"></span>
      <span class="pdf__name" id="pdfName"></span>
      <select id="converter" class="mini" aria-label="How to read the PDF">
        {% for c in converters %}
        <option value="{{ c.name }}" {% if not c.ready %}disabled{% endif %}>
          {{ c.label }}{% if not c.ready %} - {{ c.reason }}{% endif %}
        </option>
        {% endfor %}
      </select>
      <input type="text" id="pages" class="mini mini--slim" placeholder="all" aria-label="Pages" />
      <button class="mini mini--go" id="read">Read it</button>
      <button class="x" id="pdfClear" aria-label="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <button class="go" id="go">
      <span class="go__spinner" aria-hidden="true"></span>
      <span class="go__text" id="goText">Write it out</span>
    </button>

    <p class="note" id="note" hidden></p>
  </section>

  <!-- ------------------------------------------------------------------ -->
  <!-- Read                                                               -->
  <!-- ------------------------------------------------------------------ -->
  <section class="panel panel--out" id="out" hidden>
    <div class="scene">
      <div class="paper" id="paper">
        <img id="page" alt="" />
      </div>
    </div>

    <div class="bar">
      <button class="nav" id="prev" aria-label="Previous page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="bar__n" id="n">1 / 1</span>
      <button class="nav" id="next" aria-label="Next page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>

      <span class="bar__gap"></span>

      <a class="dl" id="dlPdf" download>
        <span class="dl__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
          </svg>
        </span>
        <span class="dl__text">PDF</span>
      </a>
      <a class="dl dl--quiet" id="dlPng" download>
        <span class="dl__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
          </svg>
        </span>
        <span class="dl__text">This page</span>
      </a>
      <button class="again" id="again">Write something else</button>
    </div>
  </section>

</main>

<!-- drop a PDF anywhere -->
<div class="veil" id="veil" hidden>
  <div class="veil__card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5-5 5 5"/><path d="M12 5v12"/>
    </svg>
    <p>Drop it anywhere</p>
  </div>
</div>

<input type="file" id="file" accept="application/pdf,.pdf" hidden />

<script>
  window.MAX_CHARS = {{ max_chars }};
  window.PAGE_SIZE = {{ page_size }};
</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
